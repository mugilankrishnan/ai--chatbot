<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NOVA AI - Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

:root{

--bg:#14161C;
--surface:#1B1E26;
--surface2:#20242E;

--border:#2B2F39;
--text:#F4F4F5;
--muted:#9397A8;

--purple:#7C5CFF;
--purpleDark:#6048d8;

--radius:12px;

}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:var(--bg);
font-family:Inter,sans-serif;
color:var(--text);

display:flex;
align-items:center;
justify-content:center;

min-height:100vh;

}

.wrapper{

width:100%;
max-width:1100px;

display:flex;

background:var(--surface);

border:1px solid var(--border);

border-radius:18px;

overflow:hidden;

box-shadow:0 30px 70px rgba(0,0,0,.45);

}

.left{

width:38%;

background:#181B23;

padding:55px 45px;

display:flex;

flex-direction:column;

justify-content:space-between;

}

.brand{

font-family:Fraunces,serif;

font-size:32px;

}

.brand span{

color:var(--purple);

}

.subtitle{

margin-top:8px;

color:var(--muted);

font-size:14px;

}

.steps{

margin-top:40px;

display:flex;

flex-direction:column;

gap:35px;

}

.step{

display:flex;

gap:18px;

align-items:flex-start;

}

.circle{

width:18px;
height:18px;

border-radius:50%;

border:2px solid #4b4f59;

margin-top:2px;

}

.step.active .circle{

background:var(--purple);

border-color:var(--purple);

}

.step h4{

font-size:15px;

margin-bottom:4px;

}

.step p{

font-size:13px;

color:var(--muted);

}

.quote{

font-size:15px;

font-family:Fraunces,serif;

color:#B9BCC7;

line-height:1.7;

}

.right{

flex:1;

display:flex;

align-items:center;

justify-content:center;

padding:60px;

}

.card{

width:100%;

max-width:400px;

}

.badge{

color:var(--purple);

font-size:13px;

font-weight:600;

letter-spacing:1px;

text-transform:uppercase;

margin-bottom:12px;

}

.title{

font-family:Fraunces,serif;

font-size:34px;

margin-bottom:10px;

}

.desc{

color:var(--muted);

margin-bottom:35px;

line-height:1.5;

}

.tabs{

display:flex;

background:var(--surface2);

padding:4px;

border-radius:12px;

margin-bottom:28px;

}

.tab{

flex:1;

padding:11px;

background:none;

border:none;

color:var(--muted);

cursor:pointer;

border-radius:10px;

font-size:14px;

font-weight:600;

transition:.2s;

}

.tab.active{

background:var(--purple);

color:white;

}

.form{

display:none;

}

.form.active{

display:block;

}

.field{

margin-bottom:18px;

}

label{

display:block;

margin-bottom:7px;

font-size:13px;

color:var(--muted);

}

input{

width:100%;

padding:13px 15px;

background:var(--surface2);

border:1px solid var(--border);

border-radius:12px;

color:white;

font-size:14px;

outline:none;

transition:.2s;

}

input:focus{

border-color:var(--purple);

}

button.primary{

width:100%;

padding:13px;

background:var(--purple);

border:none;

border-radius:12px;

color:white;

font-size:15px;

font-weight:600;

cursor:pointer;

transition:.2s;

}

button.primary:hover{

background:var(--purpleDark);

}

.loading{

display:none;

text-align:center;

margin:12px 0;

color:var(--purple);

}

.message{

display:none;

padding:12px;

border-radius:12px;

margin-bottom:18px;

font-size:14px;

}

.message.error{

display:block;

background:rgba(255,0,0,.15);

color:#ff7a7a;

}

.message.success{

display:block;

background:rgba(0,255,120,.12);

color:#62e48b;

}

.divider{

display:flex;

align-items:center;

gap:12px;

margin:20px 0;

color:#777;

font-size:12px;

}

.divider::before,
.divider::after{

content:"";

flex:1;

height:1px;

background:var(--border);

}

.google{

width:100%;

padding:13px;

background:white;

color:#333;

border:none;

border-radius:12px;

cursor:pointer;

display:flex;

align-items:center;

justify-content:center;

gap:10px;

font-weight:600;

}

.google img{

width:20px;

}

@media(max-width:850px){

.left{

display:none;

}

.wrapper{

margin:20px;

}

.right{

padding:35px;

}

}

</style>

</head>

<body>

<div class="wrapper">

<div class="left">

<div>

<div class="brand">
NOVA <span>AI</span>
</div>

<div class="subtitle">
Your Intelligent AI Assistant
</div>

<div class="steps">

<div class="step active">

<div class="circle"></div>

<div>

<h4>Login</h4>

<p>Access your AI workspace</p>

</div>

</div>

<div class="step">

<div class="circle"></div>

<div>

<h4>Sign Up</h4>

<p>Create your account</p>

</div>

</div>

<div class="step">

<div class="circle"></div>

<div>

<h4>Start Chatting</h4>

<p>Experience NOVA AI</p>

</div>

</div>

</div>

</div>

<div class="quote">

"Powering conversations with intelligence."

</div>

</div>

<div class="right">

<div class="card">

<div class="badge">
WELCOME
</div>

<div class="title">
Sign in to NOVA AI
</div>

<div class="desc">
Continue where you left off.
</div>

<div class="tabs">

<button class="tab active" onclick="switchTab('login')">
Login
</button>

<button class="tab" onclick="switchTab('signup')">
Sign Up
</button>

</div>

<div id="msgBox" class="message"></div>

<!-- LOGIN -->

<div class="form active" id="loginForm">

<div class="field">

<label>Email</label>

<input
type="email"
id="loginEmail"
placeholder="name@example.com">

</div>

<div class="field">

<label>Password</label>

<input
type="password"
id="loginPassword"
placeholder="Enter password">

</div>

<div class="loading" id="loginLoading">

Logging in...

</div>

<button class="primary" onclick="login()">

Sign In

</button>

<div class="divider">

OR

</div>

<button class="google" onclick="continueWithGoogle()">

<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg">

Continue with Google

</button>

</div>

<!-- SIGNUP -->

<div class="form" id="signupForm">

<div class="field">

<label>Full Name</label>

<input
type="text"
id="signupName"
placeholder="Your Name">

</div>

<div class="field">

<label>Email</label>

<input
type="email"
id="signupEmail"
placeholder="name@example.com">

</div>

<div class="field">

<label>Password</label>

<input
type="password"
id="signupPassword"
placeholder="Create password">

</div>

<div class="loading" id="signupLoading">

Creating account...

</div>

<button class="primary" onclick="signup()">

Create Account

</button>

<div class="divider">

OR

</div>

<button class="google" onclick="continueWithGoogle()">

<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg">

Continue with Google

</button>

</div>

</div>

</div>

</div>
<script>
/* Already logged in? */
if (localStorage.getItem("nova_token")) {
    window.location.href = "/";
}

/* ---------- Tabs ---------- */
function switchTab(tab) {

    document.querySelectorAll(".tab").forEach(btn => {
        btn.classList.remove("active");
    });

    document.querySelectorAll(".form").forEach(form => {
        form.classList.remove("active");
    });

    document
        .querySelector(`[onclick="switchTab('${tab}')"]`)
        .classList.add("active");

    document
        .getElementById(tab + "Form")
        .classList.add("active");

    hideMessage();

    document.querySelectorAll(".step").forEach(s => {
        s.classList.remove("active");
    });

    if (tab === "login") {
        document.querySelectorAll(".step")[0].classList.add("active");
    } else {
        document.querySelectorAll(".step")[1].classList.add("active");
    }
}

/* ---------- Message ---------- */

function showMessage(msg, type) {

    const box = document.getElementById("msgBox");

    box.innerText = msg;

    box.className = "message " + type;
}

function hideMessage() {

    document.getElementById("msgBox").className = "message";

}

/* ---------- Google ---------- */

function continueWithGoogle() {

    window.location.href = "/auth/google/login";

}

/* ---------- Login ---------- */

async function login() {

    hideMessage();

    const email =
        document.getElementById("loginEmail").value.trim();

    const password =
        document.getElementById("loginPassword").value.trim();

    if (!email || !password) {

        showMessage("Please fill all fields.","error");

        return;
    }

    document.getElementById("loginLoading").style.display = "block";

    try{

        const res = await fetch("/login",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({

                email,

                password

            })

        });

        document.getElementById("loginLoading").style.display="none";

        const data = await res.json();

        if(res.ok){

            localStorage.setItem("nova_token",data.token);

            localStorage.setItem("nova_name",data.name);

            showMessage("Login Successful! Redirecting...","success");

            setTimeout(()=>{

                window.location.href="/";

            },800);

        }

        else{

            showMessage(data.detail || "Login failed","error");

        }

    }

    catch(err){

        document.getElementById("loginLoading").style.display="none";

        showMessage("Server not responding.","error");

    }

}

/* ---------- Signup ---------- */

async function signup(){

    hideMessage();

    const name =
        document.getElementById("signupName").value.trim();

    const email =
        document.getElementById("signupEmail").value.trim();

    const password =
        document.getElementById("signupPassword").value.trim();

    if(!name || !email || !password){

        showMessage("Please fill all fields.","error");

        return;

    }

    if(password.length<6){

        showMessage("Password must be at least 6 characters.","error");

        return;

    }

    document.getElementById("signupLoading").style.display="block";

    try{

        const res = await fetch("/signup",{

            method:"POST",

            headers:{

                "Content-Type":"application/json"

            },

            body:JSON.stringify({

                name,

                email,

                password

            })

        });

        document.getElementById("signupLoading").style.display="none";

        const data = await res.json();

        if(res.ok){

            localStorage.setItem("nova_token",data.token);

            localStorage.setItem("nova_name",data.name);

            showMessage("Account Created Successfully!","success");

            setTimeout(()=>{

                window.location.href="/";

            },800);

        }

        else{

            showMessage(data.detail || "Signup failed.","error");

        }

    }

    catch(err){

        document.getElementById("signupLoading").style.display="none";

        showMessage("Server not responding.","error");

    }

}

/* ---------- Enter Key ---------- */

document.addEventListener("keydown",function(e){

    if(e.key!=="Enter") return;

    if(document.getElementById("loginForm").classList.contains("active")){

        login();

    }

    else{

        signup();

    }

});

/* ---------- Default ---------- */

switchTab("login");

</script>

</body>
</html>
