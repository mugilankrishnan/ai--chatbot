<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Signing you in...</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); min-height: 100vh; display: flex; justify-content: center; align-items: center; color: #e0e0e0; }
        .box { text-align: center; }
        .spinner { width: 36px; height: 36px; border: 4px solid rgba(108,99,255,0.3); border-top-color: #6c63ff; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="box">
        <div class="spinner"></div>
        <p>Signing you in...</p>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const token = params.get("token");
        const name = params.get("name");

        if (token) {
            localStorage.setItem("nova_token", token);
            localStorage.setItem("nova_name", name || "");
            window.location.href = "/";
        } else {
            window.location.href = "/login";
        }
    </script>
</body>
</html>
