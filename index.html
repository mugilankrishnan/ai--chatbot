<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA AI</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="app">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-title">NOVA AI</div>
        <div class="user-info" id="userInfo"></div>
        <input class="search-box" id="searchBox" placeholder="Search chats..." oninput="searchSessions()" />
        <button class="new-chat-btn" onclick="newChat()">+ New Chat</button>
        <div class="pinned-label">PINNED</div>
        <div class="session-list" id="pinnedList"></div>
        <div class="history-label">HISTORY</div>
        <div class="session-list" id="sessionList"></div>
        <div class="shortcuts">Ctrl+N New · Ctrl+K Search · Ctrl+D Theme</div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
    <div class="main">
        <div class="chat-header">
            <div style="display:flex;align-items:center;gap:10px;">
                <button class="menu-btn" onclick="toggleSidebar()">☰</button>
                NOVA AI
            </div>
            <div class="header-controls">
                <button class="export-btn" onclick="exportChat()">Export</button>
                <select class="lang-select" id="langSelect">
                    <option value="en-US">English</option>
                    <option value="ta-IN">Tamil</option>
                    <option value="hi-IN">Hindi</option>
                </select>
                <button class="toggle-btn" onclick="toggleTheme()" id="themeBtn">Light Mode</button>
            </div>
        </div>
        <div class="chat-box" id="chatBox">
            <div class="welcome">
                <h2>NOVA AI</h2>
                <p>Your intelligent assistant. How can I help you today?</p>
                <div class="suggestions">
                    <button class="suggestion-btn" onclick="suggest('Explain a concept simply')">💡 Explain a concept</button>
                    <button class="suggestion-btn" onclick="suggest('Write Python code for')">💻 Write Python code</button>
                    <button class="suggestion-btn" onclick="suggest('Summarize this topic:')">📝 Summarize a topic</button>
                    <button class="suggestion-btn" onclick="suggest('What are the differences between')">🔍 Compare two things</button>
                </div>
            </div>
        </div>
        <button class="scroll-btn" id="scrollBtn" onclick="scrollToBottom()">▼</button>
        <div class="chat-input">
            <input type="text" id="userInput" placeholder="Message NOVA AI... (Enter to send)" />
            <button class="btn" id="micBtn" onclick="startVoice()">Mic</button>
            <button class="btn" onclick="document.getElementById('imageInput').click()">Image</button>
            <button class="btn" onclick="document.getElementById('fileInput').click()">File</button>
            <input type="file" id="imageInput" accept="image/*" onchange="uploadImage(event)" />
            <input type="file" id="fileInput" accept=".pdf,.txt,.csv" onchange="uploadFile(event)" />
            <button class="btn primary" onclick="sendMessage()">Send</button>
        </div>
    </div>
</div>
<div class="toast" id="toast"></div>
<script src="/script.js"></script>
</body>
</html>
