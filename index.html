<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Chatbot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #1a1a2e; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .chat-container { width: 420px; height: 600px; background: #16213e; border-radius: 15px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .chat-header { background: #0f3460; padding: 20px; text-align: center; color: white; font-size: 20px; font-weight: bold; }
        .chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .message { max-width: 75%; padding: 12px 16px; border-radius: 15px; font-size: 14px; line-height: 1.5; }
        .user-message { background: #0f3460; color: white; align-self: flex-end; border-bottom-right-radius: 3px; }
        .bot-message { background: #e94560; color: white; align-self: flex-start; border-bottom-left-radius: 3px; }
        .chat-input { display: flex; padding: 15px; background: #0f3460; gap: 10px; }
        .chat-input input { flex: 1; padding: 12px; border: none; border-radius: 25px; background: #1a1a2e; color: white; font-size: 14px; outline: none; }
        .chat-input button { padding: 12px 20px; background: #e94560; color: white; border: none; border-radius: 25px; cursor: pointer; font-size: 14px; font-weight: bold; }
        .chat-input button:hover { background: #c73652; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header"> Mugil's Chatbot</div>
        <div class="chat-box" id="chatBox"></div>
        <div class="chat-input">
            <input type="text" id="userInput" placeholder="Type a message..." />
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const sessionId = "user1";

        async function sendMessage() {
            const input = document.getElementById("userInput");
            const message = input.value.trim();
            if (!message) return;

            addMessage(message, "user");
            input.value = "";

            const response = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ session_id: sessionId, message: message })
            });

            const data = await response.json();
            addMessage(data.reply, "bot");
        }

        function addMessage(text, sender) {
            const chatBox = document.getElementById("chatBox");
            const div = document.createElement("div");
            div.classList.add("message", sender === "user" ? "user-message" : "bot-message");
            div.textContent = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        document.getElementById("userInput").addEventListener("keypress", function(e) {
            if (e.key === "Enter") sendMessage();
        });
    </script>
</body>
</html>
